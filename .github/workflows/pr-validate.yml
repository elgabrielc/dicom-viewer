# PR Validation Workflow - Runs tests on every pull request to main

name: PR Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger for testing the workflow itself
  workflow_dispatch:

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Check JS and Python lint rules
        run: npm run lint:js && npm run lint:py

  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p \"require('./package-lock.json').packages['node_modules/playwright'].version\")" >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Copy test fixtures to test-data location
        run: |
          # Create the test data directory that Flask expects
          mkdir -p test-data
          # Copy minimal test fixtures if they exist, otherwise use sample data
          if [ -d "test-fixtures" ]; then
            cp -r test-fixtures/* test-data/
          elif [ -d "docs/sample" ]; then
            cp -r docs/sample/* test-data/
          fi

      - name: Run Playwright tests
        run: |
          source venv/bin/activate
          npx playwright test
        env:
          CI: true
          # Point Flask to the test-data directory we created
          DICOM_TEST_DATA: ./test-data

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  desktop-smoke:
    name: macOS Tauri Build Smoke
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build unsigned macOS app bundle
        env:
          # Smoke test needs a signing key because createUpdaterArtifacts is
          # enabled. This uses the real key stored as a repo secret. The
          # resulting signature is not distributed to users (only release.yml
          # publishes artifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles app
