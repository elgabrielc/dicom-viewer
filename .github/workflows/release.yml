# Copyright (c) 2026 Divergent Health Technologies
# Release Workflow - Builds, signs, notarizes, and publishes desktop releases
#
# Triggered by pushing a stable semver tag (e.g. v0.2.0).
# Tags with pre-release suffixes (v0.2.0-rc.1, v0.2.0-beta.1) are marked
# as GitHub prereleases so they don't become the /releases/latest endpoint.
#
# Creates a draft GitHub Release with signed + notarized DMGs and updater
# artifacts for both aarch64 and x86_64. The Tauri action notarizes and staples
# the `.app`; this workflow adds a post-pass that notarizes and staples the DMG
# container too before publishing. Publish the draft manually after verifying
# the artifacts.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build macOS Release
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag matches app version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match app version ($APP_VERSION)"
            exit 1
          fi

      - name: Detect prerelease
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release (aarch64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'myradone ${{ github.ref_name }}'
          releaseBody: 'See the [changelog](https://github.com/elgabrielc/dicom-viewer/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          args: --target aarch64-apple-darwin

      - name: Build and release (x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'myradone ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          args: --target x86_64-apple-darwin

      - name: Notarize and staple DMG artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          notarize_and_upload_dmg() {
            local target_triple="$1"
            local asset_suffix="$2"
            local dmg_path="src-tauri/target/${target_triple}/release/bundle/dmg/myradone_${VERSION}_${asset_suffix}.dmg"
            local dmg_name
            dmg_name="$(basename "$dmg_path")"

            if [[ ! -f "$dmg_path" ]]; then
              echo "::error::Expected DMG not found: $dmg_path"
              exit 1
            fi

            echo "Notarizing ${dmg_name}..."
            xcrun notarytool submit "$dmg_path" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait

            echo "Stapling ${dmg_name}..."
            xcrun stapler staple "$dmg_path"

            echo "Validating stapled ticket for ${dmg_name}..."
            xcrun stapler validate "$dmg_path"

            gh release delete-asset "$GITHUB_REF_NAME" "$dmg_name" --yes || true
            gh release upload "$GITHUB_REF_NAME" "$dmg_path"
          }

          notarize_and_upload_dmg "aarch64-apple-darwin" "aarch64"
          notarize_and_upload_dmg "x86_64-apple-darwin" "x64"
