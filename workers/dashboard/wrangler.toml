name = "myradone-dashboard"
main = "src/index.mjs"
compatibility_date = "2026-04-07"
workers_dev = false
preview_urls = false

[[routes]]
pattern = "dashboard.myradone.com/*"
zone_name = "myradone.com"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = false

[[d1_databases]]
binding = "SUBSCRIBERS_DB"
database_name = "myradone-subscribers"
database_id = "33a16c5c-0618-47a8-b351-7af2f4f979e9"

[[d1_databases]]
binding = "STATS_DB"
database_name = "myradone-stats"
database_id = "5f9d6a5b-ef20-4a4d-8600-972ecebb690e"

[[ratelimits]]
name = "DASHBOARD_RATE_LIMIT"
namespace_id = "2026041201"

  [ratelimits.simple]
  limit = 30
  period = 60
