<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divergent Health Technologies</title>
    <meta name="description" content="Medical imaging, reimagined. Modern clinical imaging tools by Divergent Health Technologies.">
    <meta name="theme-color" content="#FFF8F3">

    <!-- Open Graph -->
    <meta property="og:title" content="Divergent Health Technologies">
    <meta property="og:description" content="Medical imaging, reimagined. Modern clinical imaging tools for the way clinicians actually work.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://divergent.health">

    <!-- Favicon: diverging lines mark -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='34' r='2' fill='%23F08C00'/%3E%3Cline x1='20' y1='32' x2='8' y2='8' stroke='%23F08C00' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='20' y1='32' x2='32' y2='8' stroke='%23F08C00' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Copyright (c) 2026 Divergent Health Technologies -->
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #FFF8F3;
            --text: #3D3A36;
            --text-dim: #6B6660;
            --text-muted: #A09B8F;
            --accent: #F08C00;
            --accent-glow: rgba(240, 140, 0, 0.08);
            --accent-border: rgba(240, 140, 0, 0.35);
            --serif: 'Lora', Georgia, serif;
            --sans: 'Inter', system-ui, sans-serif;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-weight: 300;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Subtle radial glow for depth */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(
                ellipse 70% 50% at 50% 40%,
                rgba(240, 140, 0, 0.03) 0%,
                transparent 70%
            );
            pointer-events: none;
        }

        /* Scan line — sweeps once on load like a CT scan */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent 5%,
                rgba(240, 140, 0, 0.4) 50%,
                transparent 95%
            );
            animation: scan 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes scan {
            0%   { top: 0; opacity: 0; }
            8%   { opacity: 1; }
            85%  { opacity: 0.4; }
            100% { top: 100vh; opacity: 0; }
        }

        /* Main layout */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        .content {
            max-width: 640px;
            width: 100%;
            text-align: center;
        }

        /* Logo mark: two diverging lines from a common point */
        .mark {
            display: inline-block;
            width: 32px;
            height: 32px;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 1.2s ease 0.3s forwards;
        }

        .mark svg {
            width: 100%;
            height: 100%;
        }

        /* Brand name — DIVERGENT.health */
        .brand-name {
            font-family: var(--sans);
            font-size: clamp(2.2rem, 5.5vw, 3.4rem);
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 1s ease 0.5s forwards;
        }

        .brand-name .tld {
            color: var(--accent);
            text-transform: none;
        }

        /* Tagline — italic serif */
        h1 {
            font-family: var(--serif);
            font-style: italic;
            font-weight: 400;
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            line-height: 1.3;
            color: var(--text-dim);
            margin-bottom: 2.2rem;
            letter-spacing: -0.01em;
            opacity: 0;
            animation: fadeUp 1s ease 0.7s forwards;
        }

        /* Accent divider — draws from center */
        .divider {
            height: 1px;
            background: var(--accent);
            margin: 0 auto 2.2rem;
            opacity: 0;
            animation: drawLine 1.2s ease 1s forwards;
        }

        /* Description */
        .description {
            font-size: 1.05rem;
            font-weight: 300;
            color: var(--text-dim);
            max-width: 460px;
            margin: 0 auto 3.5rem;
            opacity: 0;
            animation: fadeUp 1s ease 1.2s forwards;
        }

        /* Contact CTA */
        .cta {
            opacity: 0;
            animation: fadeIn 1s ease 1.5s forwards;
        }

        .cta a {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 400;
            letter-spacing: 0.03em;
            padding: 0.8rem 2.2rem;
            border: 1px solid var(--accent-border);
            border-radius: 2px;
            transition: all 0.4s ease;
        }

        .cta a:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(240, 140, 0, 0.08);
        }

        /* Secondary link to viewer demo */
        .demo-link {
            margin-top: 1.8rem;
            opacity: 0;
            animation: fadeIn 1s ease 1.7s forwards;
        }

        .demo-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            transition: color 0.3s ease;
        }

        .demo-link a:hover {
            color: var(--text-dim);
        }

        .demo-link a span {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .demo-link a:hover span {
            transform: translateX(3px);
        }

        /* Footer */
        footer {
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        footer p {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes drawLine {
            from { opacity: 0; width: 0; }
            to   { opacity: 0.5; width: 56px; }
        }

        /* Respect motion preferences */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-delay: 0.01ms !important;
            }
            .scan-line { display: none; }
        }

        /* Mobile */
        @media (max-width: 480px) {
            main {
                padding: 3rem 1.5rem;
            }

            .mark {
                margin-bottom: 2.5rem;
            }

            .brand-name {
                font-size: clamp(1.8rem, 5vw, 2.4rem);
                letter-spacing: 0.04em;
                margin-bottom: 1.5rem;
            }

            .description {
                font-size: 0.95rem;
                margin-bottom: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="scan-line" aria-hidden="true"></div>

    <main>
        <div class="content">
            <div class="mark" aria-hidden="true">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="34" r="2" fill="#F08C00"/>
                    <line x1="20" y1="31" x2="8" y2="7" stroke="#F08C00" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="20" y1="31" x2="32" y2="7" stroke="#F08C00" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </div>

            <p class="brand-name">Divergent<span class="tld">.health</span></p>

            <h1>We think differently</h1>

            <div class="divider"></div>

            <p class="description">
                So your health outcomes can be different too.
            </p>

            <div class="cta">
                <a href="mailto:info@divergent.health">Get in touch</a>
            </div>

            <div class="demo-link">
                <a href="https://elgabrielc.github.io/dicom-viewer/" target="_blank" rel="noopener">
                    Try the viewer <span>&rarr;</span>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Divergent Health Technologies</p>
    </footer>
</body>
</html>
